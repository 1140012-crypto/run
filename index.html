<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>踏步賽跑</title>

<style>
body{
    margin:0;
    background:#87CEEB;
    overflow:hidden;
    text-align:center;
    font-family:Arial;
}

h1{
    margin-top:10px;
}

canvas{
    border:3px solid black;
    background:#90EE90;
}

video{
    position:absolute;
    right:20px;
    top:20px;
    width:220px;
    border:3px solid white;
}
</style>

</head>
<body>

<h1>🏃 踏步賽跑</h1>

<button id="start">開始攝影機</button>

<br><br>

<canvas id="game" width="1000" height="400"></canvas>

<video id="video" autoplay playsinline muted></video>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const player={
    x:60,
    y:280,
    speed:0
};

let distance=0;
let steps=0;

async function startCamera(){

const video=document.getElementById("video");

const stream=await navigator.mediaDevices.getUserMedia({
video:true
});

video.srcObject=stream;

}

document.getElementById("start").onclick=startCamera;


// 測試用：按空白鍵模擬踏步
document.addEventListener("keydown",(e)=>{

if(e.code==="Space"){

steps++;

player.speed=10;

}

});

function draw(){

ctx.clearRect(0,0,1000,400);

// 地面
ctx.fillStyle="#4CAF50";
ctx.fillRect(0,330,1000,70);

// 終點
ctx.fillStyle="red";
ctx.fillRect(950,0,10,400);

// 玩家
ctx.font="50px Arial";
ctx.fillText("🏃",player.x,300);

// 更新
player.x+=player.speed;

player.speed*=0.92;

distance=Math.floor(player.x);

ctx.fillStyle="black";
ctx.font="24px Arial";

ctx.fillText("步數："+steps,20,40);
ctx.fillText("距離："+distance+" m",20,70);

if(player.x>920){

ctx.font="60px Arial";
ctx.fillStyle="blue";
ctx.fillText("🎉 抵達終點！",300,180);

}

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
